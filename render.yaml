services:
  - type: worker
    name: analysis-worker
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    envVars:
      - key: WORKER_ENV
        value: production
      - key: RABBITMQ_HOST
        sync: false
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USERNAME
        sync: false
      - key: RABBITMQ_PASSWORD
        sync: false
      - key: RABBITMQ_VHOST
        value: /
      - key: APP_WORKER_JOB_POSTING_QUEUE
        value: jobdri.job-posting.ingest
      - key: APP_WORKER_JOB_POSTING_ROUTING_KEY
        value: job-posting.ingest
      - key: APP_WORKER_JOB_POSTING_EXCHANGE
        value: jobdri.worker.exchange
      - key: APP_WORKER_JOB_POSTING_DLQ
        value: jobdri.job-posting.ingest.dlq
      - key: APP_WORKER_ANALYSIS_QUEUE
        value: jobdri.analysis.execute
      - key: APP_WORKER_ANALYSIS_ROUTING_KEY
        value: analysis.execute
      - key: APP_WORKER_ANALYSIS_EXCHANGE
        value: jobdri.worker.exchange
      - key: APP_WORKER_ANALYSIS_DLQ
        value: jobdri.analysis.execute.dlq
      - key: WORKER_PREFETCH_COUNT
        value: "1"
      - key: SPRING_API_BASE_URL
        sync: false
      - key: APP_WORKER_INTERNAL_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_JOB_POSTING_MODEL
        value: gpt-4o-mini
      - key: OPENAI_ANALYSIS_MODEL
        value: gpt-4.1-mini
      - key: JOB_POSTING_CLASSIFICATION_CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: WORKER_MAX_RETRY_COUNT
        value: "3"
      - key: APP_WORKER_ANALYSIS_MAX_RETRY_COUNT
        value: "3"
      - key: APP_WORKER_ANALYSIS_QUEUE_TIMEOUT_MILLIS
        value: "300000"
